version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: movierater-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moviereviews

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .

    container_name: movierater-api

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "5000:5000"

    restart: unless-stopped

volumes:
  postgres_data: